name: A股每日报告

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "30 8 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "30 9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: 强制运行
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: report-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 运行日报脚本
        env:
          EMAIL_PWD: ${{ secrets.EMAIL_PWD }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python daily_report.py
      - uses: actions/upload-artifact@v4
        with:
          name: akshare-report
          path: report.html
