name: A股每日报告

on:
  schedule:
    # 周一到周五 15:30 UTC = 23:30 北京时间（收盘半小时后）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:  # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行日报脚本
        env:
          EMAIL_PWD: ${{ secrets.EMAIL_PWD }}
        run: python daily_report.py
