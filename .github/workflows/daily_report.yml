name: A股每日报告

on:
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 运行日报脚本
        env:
          EMAIL_PWD: ${{ secrets.EMAIL_PWD }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
        run: python daily_report.py
      - name: 上传HTML报告
        uses: actions/upload-artifact@v4
        with:
          name: akshare-report
          path: report.html
